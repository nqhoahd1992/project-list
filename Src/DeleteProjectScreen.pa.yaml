Screens:
  DeleteProjectScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gHasPendingCR,
            !IsBlank(
                LookUp(Project_ChangeRequests,
                    TargetItemID = gSelectedProject.ID &&
                    (ApprovalStatus.Value = "Pending Manager" || ApprovalStatus.Value = "Pending Executive")
                )
            )
        );
        Set(gHasActiveChildren,
            gSelectedProject.ProjectLevel = 0 &&
            !IsBlank(
                LookUp(Project_List,
                    RootProjectID = gSelectedProject.ProjectID &&
                    ProjectStatus.Value <> "Deleted"
                )
            )
        )
    Children:
      - rectHeader_3:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(163, 45, 45, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_2:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Project List - Delete Project"
            Width: =719
            X: =20
      - lblUserInfo_3:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - containerScroll_1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 120
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowPendingWarning:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(250, 238, 218, 1)
                  FillPortions: =0
                  Height: =48
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gHasPendingCR
                  Width: =Parent.Width
                Children:
                  - lblPendingWarning:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: ="⚠ A change request for this project is already pending approval. You cannot submit another one until it is resolved."
                        Width: =Parent.Width - 40
            - rowChildrenWarning:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(252, 235, 235, 1)
                  FillPortions: =0
                  Height: =48
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gHasActiveChildren
                  Width: =Parent.Width
                Children:
                  - lblChildrenWarning:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(163, 45, 45, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: ="⚠ This root project has active child projects. Delete or reassign the child projects first."
                        Width: =Parent.Width - 40
            - rowProjectTitle:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =60
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =60
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblProjectTitleValue:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        Size: =14
                        Text: =Coalesce(gSelectedProject.ProjectID, "PROJ-PENDING-" & gSelectedProject.ID) & " — " & gSelectedProject.Title
                        Width: =Parent.Width - 160
            - rowProjectInfo:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(241, 239, 232, 1)
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =80
                  LayoutWrap: =true
                  PaddingBottom: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - colType:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblTypeLabel:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Type"
                              Width: =240
                        - lblTypeValue:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectType.Value
                              Width: =240
                  - colOwner_1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblOwnerLabel_1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Owner"
                              Width: =240
                        - lblOwnerValue:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectOwner.Value
                              Width: =240
                  - colManager_1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblManagerLabel_1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Manager"
                              Width: =240
                        - lblManagerValue:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectManager.Value
                              Width: =240
                  - colStatus:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =200
                      Children:
                        - lblStatusLabel:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Status"
                              Width: =200
                        - lblStatusValue:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectStatus.Value
                              Width: =200
                  - colDates:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblDatesLabel:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Start → End"
                              Width: =240
                        - lblDatesValue:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =Text(gSelectedProject.StartDate, "dd/mm/yyyy") & " → " & Text(gSelectedProject.EndDate, "dd/mm/yyyy")
                              Width: =240
                  - colLevel_1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =200
                      Children:
                        - lblLevelLabel_1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Level"
                              Width: =200
                        - lblLevelValue:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =If(gSelectedProject.ProjectLevel = 1, "Child of " & gSelectedProject.RootProjectID, "Root")
                              Width: =200
            - rowDeleteWarning:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(252, 235, 235, 1)
                  FillPortions: =0
                  Height: =90
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =90
                  PaddingBottom: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblDeleteWarningTitle:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(163, 45, 45, 1)
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =11
                        Text: ="You are requesting to delete this project"
                        Width: =Parent.Width
                  - lblDeleteWarningBody:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(163, 45, 45, 1)
                        Size: =10
                        Text: ="After Manager and Executive approval, the project will be marked as Deleted and hidden from the project list. It will not be permanently removed and can be restored by an administrator."
                        Width: =Parent.Width - 40
            - rowDeleteReason:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =130
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblDeleteReasonLabel:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =12
                        Text: ="Reason for deletion *"
                        Width: =300
                  - txtDeleteReason:
                      Control: TextInput@0.0.54
                      Properties:
                        Height: =80
                        Mode: ='TextInputCanvas.Mode'.Multiline
                        Placeholder: ="Explain why this project should be deleted"
                        Width: =Parent.Width - 40
            - rowConfirm:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =56
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =20
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chkConfirmDelete:
                      Control: CheckBox@0.0.30
                      Properties:
                        Label: =
                        Width: =32
                  - lblConfirmDelete:
                      Control: Label@2.5.1
                      Properties:
                        Height: =32
                        PaddingLeft: =0
                        Size: =11
                        Text: ="I confirm this project should be deleted"
                        Width: =400
      - conActionBar_2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnCancelDelete:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(AllProjectsScreen)
                  Text: ="Cancel"
                  Width: =120
            - btnSubmitDelete:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(163, 45, 45, 1)
                  DisplayMode: =If(gHasPendingCR || gHasActiveChildren, DisplayMode.Disabled, DisplayMode.Edit)
                  Height: =36
                  OnSelect: |-
                    =If(
                        !chkConfirmDelete.Checked,
                        Notify("Please confirm the deletion checkbox", NotificationType.Error),
                        If(
                            IsBlank(txtDeleteReason.Value),
                            Notify("Reason for deletion is required", NotificationType.Error),
                            With(
                                {wCR: Patch(
                                    Project_ChangeRequests,
                                    Defaults(Project_ChangeRequests),
                                    {
                                        Title: "Delete - " & gSelectedProject.Title & " - " & gCurrentEmployee.Title & " - " & Text(Today(), "dd/mm/yyyy"),
                                        RequestType: {Value: "Delete"},
                                        ApprovalStatus: {Value: "Pending Manager"},
                                        RequesterEmail: User().Email,
                                        RequesterID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                        RequestReason: txtDeleteReason.Value,
                                        TargetItemID: gSelectedProject.ID,
                                        TargetProjectID: gSelectedProject.ProjectID,
                                        ProjectName: gSelectedProject.Title
                                    }
                                )},
                                If(
                                    IsBlank(wCR.ID),
                                    Notify("Failed to submit the request. Please try again.", NotificationType.Error),
                                    Project_Notify.Run(
                                        "SubmittedToManager",
                                        Concat(
                                            Filter(Project_User, Role.Value = "Manager" && IsActive),
                                            LookUp('Employee List', ID = EmployeeID.Id).Email,
                                            ";"
                                        ),
                                        wCR.Title,
                                        wCR.ID,
                                        "Delete",
                                        gSelectedProject.Title,
                                        gCurrentEmployee.Title,
                                        gCurrentEmployee.Title,
                                        ""
                                    );
                                    Notify("Delete request submitted for Manager approval", NotificationType.Success);
                                    Navigate(AllProjectsScreen)
                                )
                            )
                        )
                    )
                  Text: ="Submit Delete Request →"
                  Width: =220
