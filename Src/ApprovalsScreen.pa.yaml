                      Children:
                        - btnCancelReject:
                            Control: Button@0.0.45
                            Properties:
                              OnSelect: =Set(gShowRejectPanel, false)
                              Text: ="Cancel"
                              Width: =100
                        - btnConfirmReject:
                            Control: ModernButton@1.0.0
                            Properties:
                              Align: =Align.Center
                              BasePaletteColor: =RGBA(163, 45, 45, 1)
                              FontWeight: =""
                              OnSelect: |-
                                =If(
                                    IsBlank(txtRejectRemark.Value),
                                    Notify("A remark is required to reject", NotificationType.Error),
                                    With(
                                        {wLog: Patch(
                                            Project_ApprovalLog,
                                            Defaults(Project_ApprovalLog),
                                            {
                                                Title: "Step " & If(gSelectedCR.ApprovalStatus.Value = "Pending Manager", "1", "2") & " - Rejected - " & gSelectedCR.Title,
                                                ChangeRequestID: {Id: gSelectedCR.ID, Value: gSelectedCR.Title},
                                                ChangeRequestIDText: Text(gSelectedCR.ID),
                                                StepNumber: If(gSelectedCR.ApprovalStatus.Value = "Pending Manager", 1, 2),
                                                ApproverID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                Action: {Value: "Rejected"},
                                                Remark: txtRejectRemark.Value,
                                                ActionAt: Now()
                                            }
                                        )},
                                        If(
                                            IsBlank(wLog.ID),
                                            Notify("Failed to save the approval log. Please try again.", NotificationType.Error),
                                            With(
                                                {wCR: Patch(Project_ChangeRequests, gSelectedCR, {ApprovalStatus: {Value: "Rejected"}})},
                                                If(
                                                    IsBlank(wCR.ID),
                                                    Notify("Failed to update the request status. Please try again.", NotificationType.Error),
                                                    Project_Notify.Run(
                                                        "FinalRejected",
                                                        gSelectedCR.RequesterEmail,
                                                        gSelectedCR.Title,
                                                        gSelectedCR.ID,
                                                        gSelectedCR.RequestType.Value,
                                                        gSelectedCR.ProjectName,
                                                        gSelectedCR.RequesterID.Value,
                                                        gCurrentEmployee.Title,
                                                        txtRejectRemark.Value
                                                    );
                                                    Notify("Request rejected", NotificationType.Success);
                                                    Set(gShowRejectPanel, false);
                                                    Set(gSelectedCR, Blank());
                                                    Set(gLiveTarget, Blank())
                                                )
                                            )
                                        )
                                    )
                                )
                              PaddingBottom: =5
                              PaddingLeft: =12
                              PaddingRight: =12
                              PaddingTop: =5
                              RadiusBottomLeft: =4
                              RadiusBottomRight: =4
                              RadiusTopLeft: =4
                              RadiusTopRight: =4
                              Text: ="Confirm Reject"
                              VerticalAlign: =VerticalAlign.Middle
                              Width: =140
      - conActionBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: |-
              =!IsBlank(gSelectedCR.ID) &&
              (
                  (gSelectedCR.ApprovalStatus.Value = "Pending Manager" && gUserRole = "Manager" &&
                      If(gSelectedCR.RequestType.Value = "Create", gSelectedCR.ProjectManager.Id, gLiveTarget.ProjectManager.Id) = gCurrentEmployee.ID) ||
                  (gSelectedCR.ApprovalStatus.Value = "Pending Executive" && gUserRole = "Executive" &&
                      If(gSelectedCR.RequestType.Value = "Create", gSelectedCR.ProjectOwner.Id, gLiveTarget.ProjectOwner.Id) = gCurrentEmployee.ID)
              )
            Width: =Parent.Width - 441
            X: =441
            Y: =Parent.Height - 60
          Children:
            - btnReject:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(163, 45, 45, 1)
                  Height: =36
                  OnSelect: =Set(gShowRejectPanel, true)
                  Text: ="Reject"
                  Width: =120
            - btnApproveManager:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: |-
                    =With(
                        {wLog: Patch(
                            Project_ApprovalLog,
                            Defaults(Project_ApprovalLog),
                            {
                                Title: "Step 1 - Approved - " & gSelectedCR.Title,
                                ChangeRequestID: {Id: gSelectedCR.ID, Value: gSelectedCR.Title},
                                ChangeRequestIDText: Text(gSelectedCR.ID),
                                StepNumber: 1,
                                ApproverID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                Action: {Value: "Approved"},
                                ActionAt: Now()
                            }
                        )},
                        If(
                            IsBlank(wLog.ID),
                            Notify("Failed to save the approval log. Please try again.", NotificationType.Error),
                            With(
                                {wCR: Patch(Project_ChangeRequests, gSelectedCR, {ApprovalStatus: {Value: "Pending Executive"}})},
                                If(
                                    IsBlank(wCR.ID),
                                    Notify("Failed to update the request status. Please try again.", NotificationType.Error),
                                    Project_Notify.Run(
                                        "ManagerApprovedToExecutive",
                                        Coalesce(
                                            LookUp('Employee List',
                                                ID = If(gSelectedCR.RequestType.Value = "Create", gSelectedCR.ProjectOwner.Id, gLiveTarget.ProjectOwner.Id)
                                            ).Email,
                                            "app.admin@maxbiocare.com"
                                        ),
                                        gSelectedCR.Title,
                                        gSelectedCR.ID,
                                        gSelectedCR.RequestType.Value,
                                        gSelectedCR.ProjectName,
                                        gSelectedCR.RequesterID.Value,
                                        gCurrentEmployee.Title,
                                        ""
                                    );
                                    Notify("Approved — sent to Executive for final approval", NotificationType.Success);
                                    Set(gSelectedCR, Blank());
                                    Set(gLiveTarget, Blank())
                                )
                            )
                        )
                    )
                  Text: ="Approve →"
                  Visible: =gSelectedCR.ApprovalStatus.Value = "Pending Manager"
                  Width: =160
            - btnApproveExecutive:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  FontWeight: =""
                  Height: =36
                  OnSelect: |-
                    =Switch(
                        gSelectedCR.RequestType.Value,
                        "Create",
                        With(
                            {wNew: Patch(
                                Project_List,
                                Defaults(Project_List),
                                {
                                    Title: gSelectedCR.ProjectName,
                                    ProjectDescription: gSelectedCR.ProjectDescription,
                                    ProjectType: gSelectedCR.ProjectType,
                                    Department: gSelectedCR.Department,
                                    RequestedBy: {Id: gSelectedCR.RequesterID.Id, Value: gSelectedCR.RequesterID.Value},
                                    ProjectOwner: If(IsBlank(gSelectedCR.ProjectOwner.Id), Blank(), {Id: gSelectedCR.ProjectOwner.Id, Value: gSelectedCR.ProjectOwner.Value}),
                                    ProjectManager: If(IsBlank(gSelectedCR.ProjectManager.Id), Blank(), {Id: gSelectedCR.ProjectManager.Id, Value: gSelectedCR.ProjectManager.Value}),
                                    Priority: gSelectedCR.Priority,
                                    StartDate: gSelectedCR.StartDate,
                                    EndDate: gSelectedCR.EndDate,
                                    ProjectStatus: gSelectedCR.ProjectStatus,
                                    BudgetAmount: gSelectedCR.BudgetAmount,
                                    CapexOpex: gSelectedCR.CapexOpex,
                                    RelatedSKU: gSelectedCR.RelatedSKU,
                                    Market: gSelectedCR.Market,
                                    Channel: gSelectedCR.Channel,
                                    StrategicObjective: gSelectedCR.StrategicObjective,
                                    CostCenter: gSelectedCR.CostCenter,
                                    ProjectDocuments: gSelectedCR.ProjectDocuments,
                                    ProjectLevel: gSelectedCR.ProjectLevel,
                                    RootProjectID: gSelectedCR.RootProjectID,
                                    ApprovalStatus: {Value: "Approved"},
                                    ApprovedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title}
                                }
                            )},
                            If(
                                IsBlank(wNew.ID),
                                Notify("Failed to create the project. The request remains pending — you can retry.", NotificationType.Error),
                                With(
                                    {wPID: Patch(
                                        Project_List,
                                        wNew,
                                        {
                                            ProjectID: "PROJ-" &
                                                Switch(gSelectedCR.Department,
                                                    "Quality Assurance", "QA",
                                                    "Regulatory Affairs", "RA",
                                                    "Marketing", "MK",
                                                    "Sales", "SL",
                                                    "Supply Chain", "SC",
                                                    "Finance", "FN",
                                                    "IT", "IT",
                                                    "R&D", "RD",
                                                    "HR", "HR",
                                                    "Operations", "OP",
                                                    "GN"
                                                ) & "-" & Text(Year(Today())) & "-" & Text(wNew.ID, "000")
                                        }
                                    )},
                                    With(
                                        {wLog: Patch(
                                            Project_ApprovalLog,
                                            Defaults(Project_ApprovalLog),
                                            {
                                                Title: "Step 2 - Approved - " & gSelectedCR.Title,
                                                ChangeRequestID: {Id: gSelectedCR.ID, Value: gSelectedCR.Title},
                                                ChangeRequestIDText: Text(gSelectedCR.ID),
                                                StepNumber: 2,
                                                ApproverID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                Action: {Value: "Approved"},
                                                ActionAt: Now()
                                            }
                                        )},
                                        If(
                                            IsBlank(wLog.ID),
                                            Notify("Project was created but the approval log failed. Contact your administrator before retrying.", NotificationType.Error),
                                            With(
                                                {wCR: Patch(Project_ChangeRequests, gSelectedCR, {ApprovalStatus: {Value: "Approved"}})},
                                                If(
                                                    IsBlank(wCR.ID),
                                                    Notify("Project was created but the request status update failed. Contact your administrator.", NotificationType.Error),
                                                    Project_Notify.Run(
                                                        "FinalApproved",
                                                        gSelectedCR.RequesterEmail,
                                                        gSelectedCR.Title,
                                                        gSelectedCR.ID,
                                                        "Create",
                                                        gSelectedCR.ProjectName,
                                                        gSelectedCR.RequesterID.Value,
                                                        gCurrentEmployee.Title,
                                                        ""
                                                    );
                                                    Notify("Approved — project created as " & wPID.ProjectID, NotificationType.Success);
                                                    Set(gSelectedCR, Blank());
                                                    Set(gLiveTarget, Blank())
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        "Update",
                        With(
                            {wTarget: LookUp(Project_List, ID = gSelectedCR.TargetItemID)},
                            If(
                                IsBlank(wTarget.ID),
                                Notify("The target project no longer exists. This request cannot be applied.", NotificationType.Error),
                                With(
                                    {wUpd: Patch(
                                        Project_List,
                                        wTarget,
                                        {
                                            ProjectDescription: gSelectedCR.ProjectDescription,
                                            EndDate: gSelectedCR.EndDate
                                        }
                                    )},
                                    If(
                                        IsBlank(wUpd.ID),
                                        Notify("Failed to apply the update. The request remains pending — you can retry.", NotificationType.Error),
                                        With(
                                            {wLog: Patch(
                                                Project_ApprovalLog,
                                                Defaults(Project_ApprovalLog),
                                                {
                                                    Title: "Step 2 - Approved - " & gSelectedCR.Title,
                                                    ChangeRequestID: {Id: gSelectedCR.ID, Value: gSelectedCR.Title},
                                                    ChangeRequestIDText: Text(gSelectedCR.ID),
                                                    StepNumber: 2,
                                                    ApproverID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                    Action: {Value: "Approved"},
                                                    ActionAt: Now()
                                                }
                                            )},
                                            If(
                                                IsBlank(wLog.ID),
                                                Notify("Update was applied but the approval log failed. Contact your administrator before retrying.", NotificationType.Error),
                                                With(
                                                    {wCR: Patch(Project_ChangeRequests, gSelectedCR, {ApprovalStatus: {Value: "Approved"}})},
                                                    If(
                                                        IsBlank(wCR.ID),
                                                        Notify("Update was applied but the request status update failed. Contact your administrator.", NotificationType.Error),
                                                        Project_Notify.Run(
                                                            "FinalApproved",
                                                            gSelectedCR.RequesterEmail,
                                                            gSelectedCR.Title,
                                                            gSelectedCR.ID,
                                                            "Update",
                                                            gSelectedCR.ProjectName,
                                                            gSelectedCR.RequesterID.Value,
                                                            gCurrentEmployee.Title,
                                                            ""
                                                        );
                                                        Notify("Approved — update applied to the project", NotificationType.Success);
                                                        Set(gSelectedCR, Blank());
                                                        Set(gLiveTarget, Blank())
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        "Delete",
                        With(
                            {wTarget: LookUp(Project_List, ID = gSelectedCR.TargetItemID)},
                            If(
                                IsBlank(wTarget.ID),
                                Notify("The target project no longer exists. This request cannot be applied.", NotificationType.Error),
                                With(
                                    {wDel: Patch(
                                        Project_List,
                                        wTarget,
                                        {ProjectStatus: {Value: "Deleted"}}
                                    )},
                                    If(
                                        IsBlank(wDel.ID),
                                        Notify("Failed to apply the deletion. The request remains pending — you can retry.", NotificationType.Error),
                                        With(
                                            {wLog: Patch(
                                                Project_ApprovalLog,
                                                Defaults(Project_ApprovalLog),
                                                {
                                                    Title: "Step 2 - Approved - " & gSelectedCR.Title,
                                                    ChangeRequestID: {Id: gSelectedCR.ID, Value: gSelectedCR.Title},
                                                    ChangeRequestIDText: Text(gSelectedCR.ID),
                                                    StepNumber: 2,
                                                    ApproverID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                    Action: {Value: "Approved"},
                                                    ActionAt: Now()
                                                }
                                            )},
                                            If(
                                                IsBlank(wLog.ID),
                                                Notify("Deletion was applied but the approval log failed. Contact your administrator before retrying.", NotificationType.Error),
                                                With(
                                                    {wCR: Patch(Project_ChangeRequests, gSelectedCR, {ApprovalStatus: {Value: "Approved"}})},
                                                    If(
                                                        IsBlank(wCR.ID),
                                                        Notify("Deletion was applied but the request status update failed. Contact your administrator.", NotificationType.Error),
                                                        Project_Notify.Run(
                                                            "FinalApproved",
                                                            gSelectedCR.RequesterEmail,
                                                            gSelectedCR.Title,
                                                            gSelectedCR.ID,
                                                            "Delete",
                                                            gSelectedCR.ProjectName,
                                                            gSelectedCR.RequesterID.Value,
                                                            gCurrentEmployee.Title,
                                                            ""
                                                        );
                                                        Notify("Approved — project marked as Deleted", NotificationType.Success);
                                                        Set(gSelectedCR, Blank());
                                                        Set(gLiveTarget, Blank())
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
