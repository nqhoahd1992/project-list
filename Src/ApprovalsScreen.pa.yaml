                        PaddingRight: =10
                        Size: =11
                        Text: ="My Requests"
                        Width: =110
                        X: =40
                        Y: =40
                  - lblTabHistory:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gApprovalsTab = "History", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gApprovalsTab = "History", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gApprovalsTab = "History", FontWeight.Bold, FontWeight.Semibold)
                        Height: =28
                        HoverColor: =RGBA(83, 74, 183, 1)
                        OnSelect: =Set(gApprovalsTab, "History"); Set(gSelectedCR, Blank()); Set(gLiveTarget, Blank()); Set(gShowRejectPanel, false)
                        PaddingLeft: =10
                        PaddingRight: =10
                        Size: =11
