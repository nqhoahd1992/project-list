      - galChangeRequests:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            BorderColor: =RGBA(210, 209, 199, 1)
            Height: =Parent.Height - 108
            Items: |-
              =SortByColumns(
                  Switch(gApprovalsTab,
                      "Mine",
                      Filter(Project_ChangeRequests, RequesterEmail = User().Email),
                      "History",
                      Switch(gUserRole,
                          "Manager",
                          Filter(Project_ChangeRequests,
                              (ApprovalStatus.Value = "Approved" || ApprovalStatus.Value = "Rejected") &&
                              If(
                                  RequestType.Value = "Create",
                                  ProjectManager.Id = gCurrentEmployee.ID,
                                  LookUp(Project_List, ID = TargetItemID).ProjectManager.Id = gCurrentEmployee.ID
                              )
                          ),
                          "Executive",
                          Filter(Project_ChangeRequests,
                              (ApprovalStatus.Value = "Approved" || ApprovalStatus.Value = "Rejected") &&
                              If(
                                  RequestType.Value = "Create",
                                  ProjectOwner.Id = gCurrentEmployee.ID,
                                  LookUp(Project_List, ID = TargetItemID).ProjectOwner.Id = gCurrentEmployee.ID
                              )
                          ),
                          Filter(Project_ChangeRequests, false)
                      ),
                      Switch(gUserRole,
                          "Manager",
                          Filter(Project_ChangeRequests,
                              ApprovalStatus.Value = "Pending Manager" &&
                              If(
                                  RequestType.Value = "Create",
                                  ProjectManager.Id = gCurrentEmployee.ID,
                                  LookUp(Project_List, ID = TargetItemID).ProjectManager.Id = gCurrentEmployee.ID
                              )
                          ),
                          "Executive",
                          Filter(Project_ChangeRequests,
                              ApprovalStatus.Value = "Pending Executive" &&
                              If(
                                  RequestType.Value = "Create",
                                  ProjectOwner.Id = gCurrentEmployee.ID,
                                  LookUp(Project_List, ID = TargetItemID).ProjectOwner.Id = gCurrentEmployee.ID
                              )
                          ),
                          Filter(Project_ChangeRequests, RequesterEmail = User().Email)
                      )
                  ),
                  "ID", SortOrder.Descending
              )
            OnSelect: |-
              =Set(gSelectedCR, ThisItem);
              Set(gLiveTarget,
                  If(
                      ThisItem.RequestType.Value = "Create",
                      Blank(),
                      LookUp(Project_List, ID = ThisItem.TargetItemID)
                  )
              );
              Set(gShowRejectPanel, false)
            TemplateSize: =84
            Width: =440
            Y: =108
          Children:
            - rectRowHitArea:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =If(gSelectedCR.ID = ThisItem.ID, RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                  Height: =84
                  HoverFill: =RGBA(245, 245, 250, 1)
                  OnSelect: |-
                    =Set(gSelectedCR, ThisItem);
                    Set(gLiveTarget,
                        If(
                            ThisItem.RequestType.Value = "Create",
                            Blank(),
                            LookUp(Project_List, ID = ThisItem.TargetItemID)
                        )
                    );
                    Set(gShowRejectPanel, false)
                  Width: =Parent.Width
            - lblCRType:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =Switch(ThisItem.RequestType.Value,
                        "Create", RGBA(15, 110, 86, 1),
                        "Update", RGBA(133, 79, 11, 1),
                        "Delete", RGBA(163, 45, 45, 1),
                        RGBA(68, 68, 65, 1)
                    )
                  Fill: |-
                    =Switch(ThisItem.RequestType.Value,
                        "Create", RGBA(225, 245, 238, 1),
                        "Update", RGBA(250, 238, 218, 1),
                        "Delete", RGBA(252, 235, 235, 1),
                        RGBA(241, 239, 232, 1)
                    )
                  FontWeight: =FontWeight.Semibold
                  Height: =22
                  OnSelect: |-
                    =Set(gSelectedCR, ThisItem);
                    Set(gLiveTarget,
                        If(
                            ThisItem.RequestType.Value = "Create",
                            Blank(),
                            LookUp(Project_List, ID = ThisItem.TargetItemID)
                        )
                    );
                    Set(gShowRejectPanel, false)
                  Size: =10
                  Text: =ThisItem.RequestType.Value
                  Width: =60
                  X: =12
                  Y: =10
            - lblCRProjectName:
                Control: Label@2.5.1
                Properties:
                  FontWeight: =FontWeight.Semibold
                  Height: =22
                  OnSelect: |-
                    =Set(gSelectedCR, ThisItem);
                    Set(gLiveTarget,
                        If(
                            ThisItem.RequestType.Value = "Create",
                            Blank(),
                            LookUp(Project_List, ID = ThisItem.TargetItemID)
                        )
                    );
                    Set(gShowRejectPanel, false)
                  Size: =11
                  Text: =ThisItem.ProjectName
                  Width: =Parent.Width - 200
                  X: =80
                  Y: =10
            - lblCRStatus:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =Switch(ThisItem.ApprovalStatus.Value,
                        "Approved", RGBA(15, 110, 86, 1),
                        "Rejected", RGBA(163, 45, 45, 1),
                        RGBA(133, 79, 11, 1)
                    )
                  Fill: |-
                    =Switch(ThisItem.ApprovalStatus.Value,
                        "Approved", RGBA(225, 245, 238, 1),
                        "Rejected", RGBA(252, 235, 235, 1),
                        RGBA(250, 238, 218, 1)
