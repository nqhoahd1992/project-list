Screens:
  ApprovalsScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(gSelectedCR, Blank()); Set(gLiveTarget, Blank()); Set(gShowRejectPanel, false)
    Children:
      - rectHeader_1:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Project List - Approvals"
            Width: =719
            X: =20
      - lblUserInfo_1:
