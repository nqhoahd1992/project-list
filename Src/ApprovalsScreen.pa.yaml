                  DropShadow: =DropShadow.None
                  Height: =48
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  LayoutMinHeight: =28
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =440
                  Y: =60
                Children:
                  - lblTabToApprove:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gApprovalsTab = "To Approve", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gApprovalsTab = "To Approve", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gApprovalsTab = "To Approve", FontWeight.Bold, FontWeight.Semibold)
                        Height: =28
                        HoverColor: =RGBA(83, 74, 183, 1)
                        OnSelect: =Set(gApprovalsTab, "To Approve"); Set(gSelectedCR, Blank()); Set(gLiveTarget, Blank()); Set(gShowRejectPanel, false)
                        PaddingLeft: =10
                        PaddingRight: =10
                        Size: =11
                        Text: ="To Approve"
                        Visible: =gIsApprover
                        Width: =110
                        X: =40
                        Y: =40
                  - lblTabMine:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gApprovalsTab = "Mine", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gApprovalsTab = "Mine", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gApprovalsTab = "Mine", FontWeight.Bold, FontWeight.Semibold)
                        Height: =28
                        HoverColor: =RGBA(83, 74, 183, 1)
                        OnSelect: =Set(gApprovalsTab, "Mine"); Set(gSelectedCR, Blank()); Set(gLiveTarget, Blank()); Set(gShowRejectPanel, false)
