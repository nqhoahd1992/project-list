App:
  Properties:
    OnStart: |-
      =Set(gAppReady, false);
      Set(gCurrentEmployee, LookUp('Employee List', Email = User().Email));
      Set(gCurrentUser,
          If(
              IsBlank(LookUp(Project_User, EmployeeID.Id = gCurrentEmployee.ID && IsActive)),
              {Role: {Value: "Requester"}},
              LookUp(Project_User, EmployeeID.Id = gCurrentEmployee.ID && IsActive)
          )
      );
      Set(gUserRole, gCurrentUser.Role.Value);
      Set(gIsApprover,
          gUserRole = "Manager" ||
          gUserRole = "Sponsor"
      );
      Set(gApprovalsPendingCount,
          CountRows(
              Filter(
                  Filter(Project_ChangeRequests,
                      ApprovalStatus.Value = "Pending Sponsor" ||
                      ApprovalStatus.Value = "Pending Manager Approval" ||
                      ApprovalStatus.Value = "Pending Sponsor Approval"
                  ),
                  (ApprovalStatus.Value = "Pending Sponsor" &&
                      ProjectSponsor.Id = gCurrentEmployee.ID
                  ) ||
                  (gUserRole = "Manager" && ApprovalStatus.Value = "Pending Manager Approval" &&
                      If(
                          RequestType.Value = "Create",
                          ProjectManager.Id = gCurrentEmployee.ID,
                          LookUp(Project_List, ID = TargetItemID).ProjectManager.Id = gCurrentEmployee.ID
                      )
                  ) ||
                  (gUserRole = "Sponsor" && ApprovalStatus.Value = "Pending Sponsor Approval" &&
                      If(
                          RequestType.Value = "Create",
                          ProjectSponsor.Id = gCurrentEmployee.ID,
                          LookUp(Project_List, ID = TargetItemID).ProjectSponsor.Id = gCurrentEmployee.ID
                      )
                  )
              )
          )
      );
      Set(gSelectedProject, Blank());
      Set(gSelectedCR, Blank());
      Set(gLiveTarget, Blank());
      Set(gShowRejectPanel, false);
      Set(gShowDeleted, false);
      Set(gStatusFilter, Blank());
      Set(gLevelFilter, "All");
      Set(gApprovalsTab, "To Approve");
      Set(gHasPendingCR, false);
      Set(gAppReady, true)
    Theme: =PowerAppsTheme
