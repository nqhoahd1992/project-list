Screens:
  ViewProjectScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gHasPendingCR,
            !IsBlank(
                LookUp(Project_ChangeRequests,
                    TargetItemID = gSelectedProject.ID &&
                    (ApprovalStatus.Value = "Pending Manager" || ApprovalStatus.Value = "Pending Executive")
                )
            )
        )
    Children:
      - rectHeader_5:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_4:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Project List - Project Details"
            Width: =719
            X: =20
      - lblUserInfo_5:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - containerScroll_3:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 120
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowPendingWarning_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(250, 238, 218, 1)
                  FillPortions: =0
                  Height: =48
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gHasPendingCR
                  Width: =Parent.Width
                Children:
                  - lblPendingWarning_2:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: ="⚠ A change request for this project is currently pending approval."
                        Width: =Parent.Width - 40
            - rowProjectTitle_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =60
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =60
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblProjectTitleValue_2:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =36
                        Size: =14
                        Text: =Coalesce(gSelectedProject.ProjectID, "PROJ-PENDING-" & gSelectedProject.ID) & " — " & gSelectedProject.Title
                        Width: =Parent.Width - 320
                  - lblLevelBadge_2:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gSelectedProject.ProjectLevel = 1, RGBA(83, 74, 183, 1), RGBA(68, 68, 65, 1))
                        Fill: =If(gSelectedProject.ProjectLevel = 1, RGBA(237, 235, 254, 1), RGBA(241, 239, 232, 1))
                        FontWeight: =FontWeight.Semibold
                        Height: =28
                        Size: =10
                        Text: =If(gSelectedProject.ProjectLevel = 1, "↳ Child of " & gSelectedProject.RootProjectID, "Root")
                        Width: =240
            - rowProjectInfo_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(241, 239, 232, 1)
                  FillPortions: =0
                  Height: =160
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMinHeight: =80
                  LayoutWrap: =true
                  PaddingBottom: =20
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =20
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - colType_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblTypeLabel_2:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Type"
                              Width: =240
                        - lblTypeValue_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectType.Value
                              Width: =240
                  - colOwner_3:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblOwnerLabel_3:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Owner"
                              Width: =240
                        - lblOwnerValue_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectOwner.Value
                              Width: =240
                  - colManager_3:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblManagerLabel_3:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Manager"
                              Width: =240
                        - lblManagerValue_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectManager.Value
                              Width: =240
                  - colStatus_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =200
                      Children:
                        - lblStatusLabel_2:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Project Status"
                              Width: =200
                        - lblStatusValue_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =gSelectedProject.ProjectStatus.Value
                              Width: =200
                  - colDates_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =240
                      Children:
                        - lblDatesLabel_2:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Start → End"
                              Width: =240
                        - lblDatesValue_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =Text(gSelectedProject.StartDate, "dd/mm/yyyy") & " → " & Text(gSelectedProject.EndDate, "dd/mm/yyyy")
                              Width: =240
                  - colBudget_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =46
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =2
                        LayoutMinHeight: =80
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =200
                      Children:
                        - lblBudgetLabel_2:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(136, 135, 128, 1)
                              Height: =20
                              Size: =9
                              Text: ="Budget / Actual Cost"
                              Width: =200
                        - lblBudgetValue_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              Size: =11
                              Text: =Text(gSelectedProject.BudgetAmount, "[#,###]") & " / " & If(IsBlank(gSelectedProject.ActualCost), "—", Text(gSelectedProject.ActualCost, "[#,###]"))
                              Width: =200
            - rowCurrentDescription_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =110
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblCurrentDescLabel_2:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =20
                        Size: =9
                        Text: ="Project Description"
                        Width: =Parent.Width
                  - lblCurrentDescValue_2:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =120
                        Overflow: =Overflow.Scroll
                        Size: =11
                        Text: =gSelectedProject.ProjectDescription
                        Width: =Parent.Width - 40
      - conActionBar_4:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnCloseView:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(AllProjectsScreen)
                  Text: ="Close"
                  Width: =120
