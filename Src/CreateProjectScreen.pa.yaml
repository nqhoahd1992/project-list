                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(83, 74, 183, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        Size: =11
                        Text: ="This request will be applied only after Manager and Executive approval."
                        Width: =Parent.Width - 40
