                              Items: =Sort(Product_Database_SKU_Master, Title, SortOrder.Ascending)
                              Size: =0
                              Width: =Parent.Width
            - rowDescription:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =130
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblDescriptionLabel:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =11
                        Text: ="Project Description *"
                        Width: =300
                  - txtDescription:
                      Control: ModernTextInput@1.1.1
                      Properties:
                        FontWeight: =""
                        Height: =80
                        MaxLength: =-1
                        Placeholder: ="Describe the project scope"
                        Size: =0
                        TriggerOutput: =TriggerOutput.FocusOut
                        Type: =TextInputType.Multiline
                        Width: =Parent.Width - 40
      - conActionBar_1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnCancelCreate:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  FontWeight: =""
                  Height: =36
                  OnSelect: =Navigate(AllProjectsScreen)
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="Cancel"
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =120
            - btnSubmitCreate:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  FontWeight: =""
                  Height: =36
                  OnSelect: |-
                    =If(
                        IsBlank(txtProjectName.Text),
                        Notify("Project Name is required", NotificationType.Error),
                        If(
                            IsBlank(cmbProjectType.Selected.Value),
                            Notify("Project Type is required", NotificationType.Error),
                            If(
                                IsBlank(cmbDepartment.Selected.Value),
                                Notify("Department is required", NotificationType.Error),
                                If(
                                    IsBlank(cmbOwner.Selected.ID) || IsBlank(cmbManager.Selected.ID),
                                    Notify("Project Owner and Project Manager are required", NotificationType.Error),
                                    If(
                                        IsBlank(cmbPriority.Selected.Value),
                                        Notify("Priority is required", NotificationType.Error),
                                        If(
                                            IsBlank(cmbCostCenter.Selected.Value),
                                            Notify("Cost Center is required", NotificationType.Error),
                                            If(
                                                IsBlank(dpStartDate.SelectedDate) || IsBlank(dpEndDate.SelectedDate) || IsBlank(txtBudgetAmount.Text) || IsBlank(cmbCapexOpex.Selected.Value) || IsBlank(cmbObjective.Selected.Value) || IsBlank(cmbMarket.Selected.Value) || IsBlank(cmbChannel.Selected.Value) || IsBlank(txtDocsUrl.Text) || IsBlank(txtDescription.Text),
                                                Notify("Please fill in all required fields (Start/End Date, Budget Amount, CapEx/OpEx, Strategic Objective, Market, Channel, Project Documents URL, Project Description)", NotificationType.Error),
                                                If(
                                                    StartsWith(rdoLevel.Selected.Value, "Child") && IsBlank(cmbRootProject.Selected.ProjectID),
                                                Notify("Please select the root project", NotificationType.Error),
                                                If(
                                                    dpEndDate.SelectedDate < dpStartDate.SelectedDate,
                                                    Notify("End Date must be on or after Start Date", NotificationType.Error),
                                                    With(
                                                        {wCR: Patch(
                                                            Project_ChangeRequests,
                                                            Defaults(Project_ChangeRequests),
                                                            {
                                                                Title: "Create - " & txtProjectName.Text & " - " & gCurrentEmployee.Title & " - " & Text(Today(), "dd/mm/yyyy"),
                                                                RequestType: {Value: "Create"},
                                                                ApprovalStatus: {Value: "Pending Manager"},
                                                                RequesterEmail: User().Email,
                                                                RequesterID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                                ProjectName: txtProjectName.Text,
                                                                ProjectDescription: txtDescription.Text,
                                                                ProjectType: {Value: cmbProjectType.Selected.Value},
                                                                Department: cmbDepartment.Selected.Value,
                                                                ProjectOwner: {Id: cmbOwner.Selected.ID, Value: cmbOwner.Selected.Title},
                                                                ProjectManager: {Id: cmbManager.Selected.ID, Value: cmbManager.Selected.Title},
                                                                Priority: {Value: cmbPriority.Selected.Value},
                                                                StartDate: dpStartDate.SelectedDate,
                                                                EndDate: dpEndDate.SelectedDate,
                                                                ProjectStatus: {Value: "Not Started"},
                                                                BudgetAmount: Value(txtBudgetAmount.Text),
                                                                CapexOpex: {Value: cmbCapexOpex.Selected.Value},
                                                                RelatedSKU: ForAll(cmbSKU.SelectedItems, {Id: ID, Value: Title}),
                                                                Market: {Value: cmbMarket.Selected.Value},
                                                                Channel: {Value: cmbChannel.Selected.Value},
                                                                StrategicObjective: {Value: cmbObjective.Selected.Value},
                                                                CostCenter: {Value: cmbCostCenter.Selected.Value},
                                                                ProjectDocuments: txtDocsUrl.Text,
                                                                ProjectLevel: If(StartsWith(rdoLevel.Selected.Value, "Root"), 0, 1),
                                                                RootProjectID: If(StartsWith(rdoLevel.Selected.Value, "Child"), cmbRootProject.Selected.ProjectID, Blank())
                                                            }
                                                        )},
                                                        If(
                                                            IsBlank(wCR.ID),
                                                            Notify("Failed to submit the request. Please try again.", NotificationType.Error),
                                                            Project_Notify.Run(
                                                                "SubmittedToManager",
                                                                Coalesce(
                                                                    LookUp('Employee List', ID = cmbManager.Selected.ID).Email,
                                                                    "app.admin@maxbiocare.com"
                                                                ),
                                                                wCR.Title,
                                                                wCR.ID,
                                                                "Create",
                                                                txtProjectName.Text,
                                                                gCurrentEmployee.Title,
                                                                gCurrentEmployee.Title,
                                                                ""
                                                            );
                                                            Notify("Request submitted for Manager approval", NotificationType.Success);
                                                            Navigate(AllProjectsScreen)
                                                        )
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                    )
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="Submit Request →"
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =180
