                        Height: =60
                        Mode: ='TextInputCanvas.Mode'.Multiline
                        Placeholder: ="Context for the approvers"
                        Width: =Parent.Width - 40
      - conActionBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnCancelCreate:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(AllProjectsScreen)
                  Text: ="Cancel"
                  Width: =120
            - btnSubmitCreate:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: |-
                    =If(
                        IsBlank(txtProjectName.Value),
                        Notify("Project Name is required", NotificationType.Error),
                        If(
                            IsBlank(cmbProjectType.Selected.Value),
                            Notify("Project Type is required", NotificationType.Error),
                            If(
                                CountRows(cmbDepartment.SelectedItems) = 0,
                                Notify("At least one Department is required", NotificationType.Error),
                                If(
                                    IsBlank(cmbOwner.Selected.ID) || IsBlank(cmbManager.Selected.ID),
                                    Notify("Project Owner and Project Manager are required", NotificationType.Error),
                                    If(
                                        IsBlank(cmbPriority.Selected.Value),
                                        Notify("Priority is required", NotificationType.Error),
                                        If(
                                            IsBlank(cmbCostCenter.Selected.Value),
                                            Notify("Cost Center is required", NotificationType.Error),
                                            If(
                                                StartsWith(rdoLevel.Selected.Value, "Child") && IsBlank(cmbRootProject.Selected.ProjectID),
                                                Notify("Please select the root project", NotificationType.Error),
                                                If(
                                                    !IsBlank(dpStartDate.SelectedDate) && !IsBlank(dpEndDate.SelectedDate) && dpEndDate.SelectedDate < dpStartDate.SelectedDate,
                                                    Notify("End Date must be on or after Start Date", NotificationType.Error),
                                                    With(
                                                        {wCR: Patch(
                                                            Project_ChangeRequests,
                                                            Defaults(Project_ChangeRequests),
                                                            {
                                                                Title: "Create - " & txtProjectName.Value & " - " & gCurrentEmployee.Title & " - " & Text(Today(), "dd/mm/yyyy"),
                                                                RequestType: {Value: "Create"},
                                                                ApprovalStatus: {Value: "Pending Manager"},
                                                                RequesterEmail: User().Email,
                                                                RequesterID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                                RequestReason: txtReason.Value,
                                                                ProjectName: txtProjectName.Value,
                                                                ProjectDescription: txtDescription.Value,
                                                                ProjectType: {Value: cmbProjectType.Selected.Value},
                                                                Department: ForAll(cmbDepartment.SelectedItems, {Value: ThisRecord.Value}),
                                                                ProjectOwner: {Id: cmbOwner.Selected.ID, Value: cmbOwner.Selected.Title},
                                                                ProjectManager: {Id: cmbManager.Selected.ID, Value: cmbManager.Selected.Title},
                                                                Priority: {Value: cmbPriority.Selected.Value},
                                                                StartDate: dpStartDate.SelectedDate,
                                                                EndDate: dpEndDate.SelectedDate,
                                                                ProjectStatus: If(
                                                                    IsBlank(cmbInitialStatus.Selected.Value),
                                                                    {Value: "Not Started"},
                                                                    {Value: cmbInitialStatus.Selected.Value}
                                                                ),
                                                                BudgetAmount: Value(txtBudgetAmount.Value),
                                                                CapexOpex: If(IsBlank(cmbCapexOpex.Selected.Value), Blank(), {Value: cmbCapexOpex.Selected.Value}),
                                                                RelatedSKU: If(IsBlank(cmbSKU.Selected.ID), Blank(), {Id: cmbSKU.Selected.ID, Value: cmbSKU.Selected.Title}),
                                                                Market: If(IsBlank(cmbMarket.Selected.Value), Blank(), {Value: cmbMarket.Selected.Value}),
                                                                Channel: If(IsBlank(cmbChannel.Selected.Value), Blank(), {Value: cmbChannel.Selected.Value}),
                                                                StrategicObjective: If(IsBlank(cmbObjective.Selected.Value), Blank(), {Value: cmbObjective.Selected.Value}),
                                                                CostCenter: {Value: cmbCostCenter.Selected.Value},
                                                                Country: If(IsBlank(cmbCountry.Selected.Value), Blank(), {Value: cmbCountry.Selected.Value}),
                                                                ProjectDocuments: txtDocsUrl.Value,
                                                                ProjectLevel: If(StartsWith(rdoLevel.Selected.Value, "Root"), 0, 1),
                                                                RootProjectID: If(StartsWith(rdoLevel.Selected.Value, "Child"), cmbRootProject.Selected.ProjectID, Blank())
                                                            }
                                                        )},
                                                        If(
                                                            IsBlank(wCR.ID),
                                                            Notify("Failed to submit the request. Please try again.", NotificationType.Error),
                                                            Project_Notify.Run(
                                                                "SubmittedToManager",
                                                                Concat(
                                                                    Filter(Project_User, Role.Value = "Manager" && IsActive),
                                                                    LookUp('Employee List', ID = EmployeeID.Id).Email,
                                                                    ";"
                                                                ),
                                                                wCR.Title,
                                                                wCR.ID,
                                                                "Create",
                                                                txtProjectName.Value,
                                                                gCurrentEmployee.Title,
                                                                gCurrentEmployee.Title,
                                                                ""
                                                            );
                                                            Notify("Request submitted for Manager approval", NotificationType.Success);
                                                            Navigate(AllProjectsScreen)
                                                        )
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                  Text: ="Submit Request →"
                  Width: =180
