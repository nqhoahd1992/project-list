                  - lblFilterCancelled:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gStatusFilter = "Cancelled", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gStatusFilter = "Cancelled", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gStatusFilter = "Cancelled", FontWeight.Bold, FontWeight.Semibold)
