                  LayoutOverflowX: =LayoutOverflow.Scroll
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =Not(IsBlank(gCurrentEmployee.ID))
                  Width: =230
                  Y: =140
                Children:
                  - lblFilterLevelAll:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gLevelFilter = "All", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gLevelFilter = "All", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gLevelFilter = "All", FontWeight.Bold, FontWeight.Semibold)
                        Height: =24
                        HoverColor: =RGBA(83, 74, 183, 1)
                        OnSelect: =Set(gLevelFilter, "All")
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =11
                        Text: ="All Levels"
                        Width: =100
                  - divFilter8:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Fill: =RGBA(210, 209, 199, 1)
                        Height: =16
                        Width: =1
                  - lblFilterLevelRoot:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gLevelFilter = "Root", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gLevelFilter = "Root", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gLevelFilter = "Root", FontWeight.Bold, FontWeight.Semibold)
                        Height: =24
                        HoverColor: =RGBA(83, 74, 183, 1)
                        OnSelect: =Set(gLevelFilter, "Root")
                        PaddingLeft: =8
