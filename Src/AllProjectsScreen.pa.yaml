      - rectFilterBarBorder:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(210, 209, 199, 1)
            Height: =1
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =188
      - galProjects:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            BorderColor: =RGBA(210, 209, 199, 1)
            Height: =Parent.Height - 188
            Items: |-
              =SortByColumns(
                  Filter(Project_List,
                      (gShowDeleted || ProjectStatus.Value <> "Deleted") &&
                      (IsBlank(gStatusFilter) || ProjectStatus.Value = gStatusFilter) &&
                      (gLevelFilter = "All" ||
                          (gLevelFilter = "Root" && ProjectLevel = 0) ||
                          (gLevelFilter = "Child" && ProjectLevel = 1)
                      ) &&
                      (IsBlank(txtSearch.Value) ||
                          StartsWith(Title, txtSearch.Value) ||
                          StartsWith(ProjectID, txtSearch.Value)
                      )
                  ),
                  "ID", SortOrder.Descending
              )
            TemplateSize: =92
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =188
          Children:
            - lblProjectTitle:
                Control: Label@2.5.1
                Properties:
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Text: =Coalesce(ThisItem.ProjectID, "PROJ-PENDING-" & ThisItem.ID) & " — " & ThisItem.Title
                  Width: =Parent.Width - 620
                  X: =16
                  Y: =10
            - lblLevelBadge:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(ThisItem.ProjectLevel = 1, RGBA(83, 74, 183, 1), RGBA(68, 68, 65, 1))
                  Fill: =If(ThisItem.ProjectLevel = 1, RGBA(237, 235, 254, 1), RGBA(241, 239, 232, 1))
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =10
                  Text: =If(ThisItem.ProjectLevel = 1, "↳ " & ThisItem.RootProjectID, "Root")
                  X: =1061
                  Y: =10
            - lblPendingChangeBadge:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =RGBA(133, 79, 11, 1)
                  Fill: =RGBA(250, 238, 218, 1)
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =10
                  Text: ="Change pending"
                  Visible: |-
                    =!IsBlank(
                        LookUp(Project_ChangeRequests,
                            TargetItemID = ThisItem.ID &&
                            (ApprovalStatus.Value = "Pending Manager" || ApprovalStatus.Value = "Pending Executive")
                        )
                    )
                  Width: =120
                  X: =923
                  Y: =10
            - lblProjectStatus:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =Switch(ThisItem.ProjectStatus.Value,
                        "Completed", RGBA(15, 110, 86, 1),
                        "Deleted", RGBA(163, 45, 45, 1),
                        "Cancelled", RGBA(163, 45, 45, 1),
                        "On Hold", RGBA(133, 79, 11, 1),
                        "In Progress", RGBA(83, 74, 183, 1),
                        RGBA(68, 68, 65, 1)
                    )
                  Fill: |-
                    =Switch(ThisItem.ProjectStatus.Value,
                        "Completed", RGBA(225, 245, 238, 1),
                        "Deleted", RGBA(252, 235, 235, 1),
                        "Cancelled", RGBA(252, 235, 235, 1),
                        "On Hold", RGBA(250, 238, 218, 1),
                        "In Progress", RGBA(225, 220, 252, 1),
                        RGBA(241, 239, 232, 1)
                    )
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =10
                  Text: =ThisItem.ProjectStatus.Value
                  Width: =120
                  X: =1226
                  Y: =10
            - lblProjectMeta:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(136, 135, 128, 1)
                  Height: =24
                  Size: =11
                  Text: |-
                    ="Owner: " & ThisItem.ProjectOwner.Value &
                    " | Manager: " & ThisItem.ProjectManager.Value &
                    If(IsBlank(ThisItem.StartDate), "", " | " & Text(ThisItem.StartDate, "dd/mm/yyyy") & " → " & Text(ThisItem.EndDate, "dd/mm/yyyy")) &
                    If(IsBlank(ThisItem.BudgetAmount) || ThisItem.BudgetAmount = 0, "", " | Budget: " & Text(ThisItem.BudgetAmount, "[#,###]")) &
                    If(IsBlank(ThisItem.ActualCost) || ThisItem.ActualCost = 0, "", " | Actual: " & Text(ThisItem.ActualCost, "[#,###]"))
                  Width: =Parent.Width - 620
                  X: =16
                  Y: =46
            - btnRowUpdate:
                Control: Button@0.0.45
                Properties:
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  OnSelect: =Set(gSelectedProject, ThisItem); Navigate(UpdateProjectScreen)
                  Text: ="Update"
                  Visible: =ThisItem.ProjectStatus.Value <> "Deleted"
                  Width: =90
                  X: =1151
                  Y: =53
            - btnRowDelete:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(163, 45, 45, 1)
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  OnSelect: =Set(gSelectedProject, ThisItem); Navigate(DeleteProjectScreen)
                  Text: ="Delete"
                  Visible: =ThisItem.ProjectStatus.Value <> "Deleted"
                  Width: =90
                  X: =1256
                  Y: =53
            - rectSeparator:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =1
                  Width: =Parent.Width
                  Y: =91
