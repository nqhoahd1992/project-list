Screens:
  AllProjectsScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(gStatusFilter, Blank());
        Set(gLevelFilter, "All");
        Set(gApprovalsPendingCount,
            CountRows(
                Filter(
                    Filter(Project_ChangeRequests,
                        ApprovalStatus.Value = "Pending Sponsor" ||
                        ApprovalStatus.Value = "Pending Manager Approval" ||
                        ApprovalStatus.Value = "Pending Sponsor Approval"
                    ),
                    (ApprovalStatus.Value = "Pending Sponsor" &&
                        ProjectSponsor.Id = gCurrentEmployee.ID
                    ) ||
                    (gUserRole = "Manager" && ApprovalStatus.Value = "Pending Manager Approval" &&
                        If(
                            RequestType.Value = "Create",
                            ProjectManager.Id = gCurrentEmployee.ID,
                            LookUp(Project_List, ID = TargetItemID).ProjectManager.Id = gCurrentEmployee.ID
                        )
                    ) ||
                    (gUserRole = "Sponsor" && ApprovalStatus.Value = "Pending Sponsor Approval" &&
                        If(
                            RequestType.Value = "Create",
                            ProjectSponsor.Id = gCurrentEmployee.ID,
                            LookUp(Project_List, ID = TargetItemID).ProjectSponsor.Id = gCurrentEmployee.ID
                        )
                    )
                )
            )
        )
    Children:
      - lblNoRole:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =If(gAppReady, RGBA(163, 45, 45, 1), RGBA(136, 135, 128, 1))
            Fill: =If(gAppReady, RGBA(252, 235, 235, 1), RGBA(255, 255, 255, 1))
            Height: =Parent.Height - 60
            Size: =12
            Text: =If(gAppReady, "⚠ Your account was not found in the system. Please contact your administrator.", "Checking your account...")
            Visible: =Not(gAppReady) || IsBlank(gCurrentEmployee.ID)
            Width: =Parent.Width
            Y: =60
      - rectHeader:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblAppTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Project List"
            Width: =400
            X: =20
      - lblUserInfo:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - rowToolbar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =80
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =10
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =20
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =20
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =60
          Children:
            - lblSectionTitle:
                Control: Label@2.5.1
                Properties:
                  FillPortions: =1
                  FontWeight: =FontWeight.Bold
                  Size: =14
                  Text: ="All Projects"
                  Width: =300
            - txtSearch:
                Control: ModernTextInput@1.1.1
                Properties:
                  FontWeight: =""
                  Height: =36
                  MaxLength: =-1
                  Placeholder: ="Search by name or Project ID"
                  Size: =0
                  TriggerOutput: =TriggerOutput.FocusOut
                  Width: =260
            - btnMyRequests:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  BasePaletteColor: =RGBA(168, 110, 235, 1)
                  FontWeight: =""
                  Height: =36
                  OnSelect: =Set(gApprovalsTab, "Mine"); Navigate(ApprovalsScreen)
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="My Requests"
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =130
            - btnApprovals:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  BasePaletteColor: =RGBA(133, 79, 11, 1)
                  FontWeight: =""
                  Height: =36
                  OnSelect: =Set(gApprovalsTab, If(gIsApprover, "To Approve", "Assign Manager")); Navigate(ApprovalsScreen)
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="Approvals (" & gApprovalsPendingCount & ")"
                  VerticalAlign: =VerticalAlign.Middle
                  Visible: =gIsApprover || gApprovalsPendingCount > 0
                  Width: =150
            - btnNewProject:
                Control: ModernButton@1.0.0
                Properties:
                  Align: =Align.Center
                  FontWeight: =""
                  Height: =36
                  Icon: ="Add"
                  OnSelect: =Navigate(CreateProjectScreen)
                  PaddingBottom: =5
                  PaddingLeft: =12
                  PaddingRight: =12
                  PaddingTop: =5
                  RadiusBottomLeft: =4
                  RadiusBottomRight: =4
                  RadiusTopLeft: =4
                  RadiusTopRight: =4
                  Text: ="New Project"
                  VerticalAlign: =VerticalAlign.Middle
                  Width: =150
