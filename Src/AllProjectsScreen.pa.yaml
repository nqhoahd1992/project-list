                        BorderColor: =RGBA(0, 0, 0, 0)
                        Fill: =RGBA(210, 209, 199, 1)
                        Height: =16
                        Width: =1
                  - lblFilterShowDeleted:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gShowDeleted, RGBA(163, 45, 45, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gShowDeleted, RGBA(252, 235, 235, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gShowDeleted, FontWeight.Bold, FontWeight.Semibold)
                        Height: =24
                        HoverColor: =RGBA(163, 45, 45, 1)
                        OnSelect: =Set(gShowDeleted, !gShowDeleted)
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =11
                        Text: =If(gShowDeleted, "Hide Deleted", "Show Deleted")
                        Visible: =gUserRole = "Sponsor"
                        Width: =110
      - rectFilterBarBorder:
          Control: Rectangle@2.3.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Fill: =RGBA(210, 209, 199, 1)
            Height: =1
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =188
      - galProjects:
          Control: Gallery@2.15.0
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            BorderColor: =RGBA(210, 209, 199, 1)
            Height: =Parent.Height - 188
            Items: |-
              =SortByColumns(
                  Filter(Project_List,
                      (gShowDeleted ||
                          ProjectStatus.Value = "Not Started" ||
                          ProjectStatus.Value = "In Planning" ||
                          ProjectStatus.Value = "In Progress" ||
                          ProjectStatus.Value = "On Hold" ||
                          ProjectStatus.Value = "Completed" ||
                          ProjectStatus.Value = "Cancelled"
                      ) &&
                      (IsBlank(gStatusFilter) || ProjectStatus.Value = gStatusFilter) &&
                      (gLevelFilter = "All" ||
                          (gLevelFilter = "Root" && ProjectLevel = 0) ||
                          (gLevelFilter = "Child" && ProjectLevel = 1)
                      ) &&
                      (IsBlank(txtSearch.Text) ||
                          StartsWith(Title, txtSearch.Text) ||
                          StartsWith(ProjectID, txtSearch.Text)
                      )
                  ),
                  "ID", SortOrder.Descending
              )
            OnSelect: =Set(gSelectedProject, ThisItem); Navigate(ViewProjectScreen)
            TemplateSize: =92
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =188
          Children:
            - lblProjectTitle:
                Control: Label@2.5.1
                Properties:
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Text: =Coalesce(ThisItem.ProjectID, "PROJ-PENDING-" & ThisItem.ID) & " — " & ThisItem.Title
                  Width: =Parent.Width - 620
                  X: =16
                  Y: =15
            - lblLevelBadge:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =If(ThisItem.ProjectLevel = 1, RGBA(83, 74, 183, 1), RGBA(68, 68, 65, 1))
                  Fill: =If(ThisItem.ProjectLevel = 1, RGBA(237, 235, 254, 1), RGBA(241, 239, 232, 1))
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =10
                  Text: =If(ThisItem.ProjectLevel = 1, "↳ " & ThisItem.RootProjectID, "Root")
                  Width: =180
                  X: =1036
                  Y: =10
            - lblPendingChangeBadge:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: =RGBA(133, 79, 11, 1)
                  Fill: =RGBA(250, 238, 218, 1)
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =10
                  Text: |-
                    =Switch(
                        LookUp(Project_ChangeRequests,
                            TargetItemID = ThisItem.ID &&
                            (ApprovalStatus.Value = "Pending Manager Approval" || ApprovalStatus.Value = "Pending Sponsor Approval")
                        ).RequestType.Value,
                        "Update", "Update pending",
                        "Delete", "Delete pending",
                        "Change pending"
                    )
                  Visible: |-
                    =!IsBlank(
                        LookUp(Project_ChangeRequests,
                            TargetItemID = ThisItem.ID &&
                            (ApprovalStatus.Value = "Pending Manager Approval" || ApprovalStatus.Value = "Pending Sponsor Approval")
                        )
                    )
                  Width: =120
                  X: =903
                  Y: =10
            - galProjectsBtn:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Height: =30
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =110
                  X: =Parent.Width - 130
                  Y: =50
                Children:
                  - btnRowView:
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =Align.Center
                        FontWeight: =FontWeight.Semibold
                        Height: =30
                        Icon: ="Eye"
                        Layout: =ButtonLayout.IconOnly
                        OnSelect: =Set(gSelectedProject, ThisItem); Navigate(ViewProjectScreen)
                        PaddingBottom: =5
                        PaddingLeft: =12
                        PaddingRight: =12
                        PaddingTop: =5
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        Text: ="View"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =30
                        X: =40
                        Y: =40
                  - btnRowUpdate:
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =Align.Center
                        FontWeight: =FontWeight.Semibold
                        Height: =30
                        Icon: ="Edit"
                        Layout: =ButtonLayout.IconOnly
                        OnSelect: =Set(gSelectedProject, ThisItem); Navigate(UpdateProjectScreen)
                        PaddingBottom: =5
                        PaddingLeft: =12
                        PaddingRight: =12
                        PaddingTop: =5
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        Text: ="Update"
                        VerticalAlign: =VerticalAlign.Middle
                        Visible: |-
                          =ThisItem.ProjectStatus.Value <> "Deleted" &&
                          ThisItem.RequestedBy.Id = gCurrentEmployee.ID &&
                          IsBlank(
                              LookUp(Project_ChangeRequests,
                                  TargetItemID = ThisItem.ID &&
                                  (ApprovalStatus.Value = "Pending Manager Approval" || ApprovalStatus.Value = "Pending Sponsor Approval")
                              )
                          )
                        Width: =30
                        X: =40
                        Y: =40
                  - btnRowDelete:
                      Control: ModernButton@1.0.0
                      Properties:
                        Align: =Align.Center
                        BasePaletteColor: =RGBA(163, 45, 45, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =30
                        Icon: ="Delete"
                        Layout: =ButtonLayout.IconOnly
                        OnSelect: |-
                          =If(
                              ThisItem.ProjectLevel = 0 &&
                              !IsBlank(
                                  LookUp(Project_List,
                                      RootProjectID = ThisItem.ProjectID &&
                                      (ProjectStatus.Value = "Not Started" ||
                                          ProjectStatus.Value = "In Planning" ||
                                          ProjectStatus.Value = "In Progress" ||
                                          ProjectStatus.Value = "On Hold" ||
                                          ProjectStatus.Value = "Completed" ||
                                          ProjectStatus.Value = "Cancelled")
                                  )
                              ),
                              Notify("This root project has active child projects. Delete all child projects before deleting the root.", NotificationType.Error),
                              Set(gSelectedProject, ThisItem); Navigate(DeleteProjectScreen)
                          )
                        PaddingBottom: =5
                        PaddingLeft: =12
                        PaddingRight: =12
                        PaddingTop: =5
                        RadiusBottomLeft: =4
                        RadiusBottomRight: =4
                        RadiusTopLeft: =4
                        RadiusTopRight: =4
                        Text: ="Delete"
                        VerticalAlign: =VerticalAlign.Middle
                        Visible: |-
                          =ThisItem.ProjectStatus.Value <> "Deleted" &&
                          ThisItem.RequestedBy.Id = gCurrentEmployee.ID &&
                          IsBlank(
                              LookUp(Project_ChangeRequests,
                                  TargetItemID = ThisItem.ID &&
                                  (ApprovalStatus.Value = "Pending Manager Approval" || ApprovalStatus.Value = "Pending Sponsor Approval")
                              )
                          )
                        Width: =30
                        X: =40
                        Y: =40
            - lblProjectStatus:
                Control: Label@2.5.1
                Properties:
                  Align: =Align.Center
                  Color: |-
                    =Switch(ThisItem.ProjectStatus.Value,
                        "Completed", RGBA(15, 110, 86, 1),
                        "Deleted", RGBA(163, 45, 45, 1),
                        "Cancelled", RGBA(163, 45, 45, 1),
                        "On Hold", RGBA(133, 79, 11, 1),
                        "In Progress", RGBA(83, 74, 183, 1),
                        RGBA(68, 68, 65, 1)
                    )
                  Fill: |-
                    =Switch(ThisItem.ProjectStatus.Value,
                        "Completed", RGBA(225, 245, 238, 1),
                        "Deleted", RGBA(252, 235, 235, 1),
                        "Cancelled", RGBA(252, 235, 235, 1),
                        "On Hold", RGBA(250, 238, 218, 1),
                        "In Progress", RGBA(225, 220, 252, 1),
                        RGBA(241, 239, 232, 1)
                    )
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =10
                  Text: =ThisItem.ProjectStatus.Value
                  Width: =120
                  X: =1226
                  Y: =10
            - lblProjectMeta:
                Control: Label@2.5.1
                Properties:
                  Color: =RGBA(136, 135, 128, 1)
                  Height: =24
                  Size: =11
                  Text: |-
                    ="Sponsor: " & ThisItem.ProjectSponsor.Value &
                    " | Manager: " & ThisItem.ProjectManager.Value &
                    If(IsBlank(ThisItem.StartDate), "", " | " & Text(ThisItem.StartDate, "dd/mm/yyyy") & " → " & Text(ThisItem.EndDate, "dd/mm/yyyy")) &
                    If(IsBlank(ThisItem.BudgetAmount) || ThisItem.BudgetAmount = 0, "", " | Budget: " & Text(ThisItem.BudgetAmount, "[#,###]") & " " & ThisItem.Currency) &
                    If(IsBlank(ThisItem.ActualCost) || ThisItem.ActualCost = 0, "", " | Actual: " & Text(ThisItem.ActualCost, "[#,###]") & " " & ThisItem.Currency)
                  Width: =Parent.Width - 350
                  X: =16
                  Y: =51
            - rectSeparator:
                Control: Rectangle@2.3.0
                Properties:
                  Fill: =RGBA(210, 209, 199, 1)
                  Height: =1
                  Width: =Parent.Width
                  Y: =91
