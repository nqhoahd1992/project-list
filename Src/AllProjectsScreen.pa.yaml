                        Fill: =If(gShowDeleted, RGBA(252, 235, 235, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gShowDeleted, FontWeight.Bold, FontWeight.Semibold)
                        Height: =24
                        HoverColor: =RGBA(163, 45, 45, 1)
                        OnSelect: =Set(gShowDeleted, !gShowDeleted)
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =11
                        Text: =If(gShowDeleted, "Hide Deleted", "Show Deleted")
