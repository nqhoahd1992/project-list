                        Width: =60
                  - divFilter8_1:
                      Control: Rectangle@2.3.0
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 0)
                        Fill: =RGBA(210, 209, 199, 1)
                        Height: =16
                        Width: =1
                  - lblFilterLevelChild:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        Color: =If(gLevelFilter = "Child", RGBA(83, 74, 183, 1), RGBA(136, 135, 128, 1))
                        Fill: =If(gLevelFilter = "Child", RGBA(237, 235, 254, 1), RGBA(0, 0, 0, 0))
                        FontWeight: =If(gLevelFilter = "Child", FontWeight.Bold, FontWeight.Semibold)
                        Height: =24
                        HoverColor: =RGBA(83, 74, 183, 1)
                        OnSelect: =Set(gLevelFilter, "Child")
