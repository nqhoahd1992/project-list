Screens:
  AllProjectsScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: =Set(gStatusFilter, Blank()); Set(gLevelFilter, "All")
    Children:
      - lblNoRole:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Center
            Color: =If(gAppReady, RGBA(163, 45, 45, 1), RGBA(136, 135, 128, 1))
            Fill: =If(gAppReady, RGBA(252, 235, 235, 1), RGBA(255, 255, 255, 1))
            Height: =Parent.Height - 60
            Size: =12
            Text: =If(gAppReady, "⚠ Your account was not found in the system. Please contact your administrator.", "Checking your account...")
            Visible: =Not(gAppReady) || IsBlank(gCurrentEmployee.ID)
            Width: =Parent.Width
            Y: =60
      - rectHeader:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblAppTitle:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Project List"
            Width: =400
            X: =20
      - lblUserInfo:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - rowToolbar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =80
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =10
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =20
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =20
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =60
          Children:
            - lblSectionTitle:
                Control: Label@2.5.1
                Properties:
                  FillPortions: =1
                  FontWeight: =FontWeight.Bold
                  Size: =14
                  Text: ="All Projects"
                  Width: =300
            - txtSearch:
                Control: TextInput@0.0.54
                Properties:
                  Height: =36
                  Placeholder: ="Search by name or Project ID"
                  Width: =260
            - btnMyRequests:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Set(gApprovalsTab, "Mine"); Navigate(ApprovalsScreen)
                  Text: ="My Requests"
                  Width: =130
            - btnApprovals:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(133, 79, 11, 1)
                  Height: =36
                  OnSelect: =Set(gApprovalsTab, "To Approve"); Navigate(ApprovalsScreen)
                  Text: |-
                    ="Approvals (" &
                    CountRows(
                        Filter(Project_ChangeRequests,
                            Switch(gUserRole,
                                "Manager", ApprovalStatus.Value = "Pending Manager",
                                "Executive", ApprovalStatus.Value = "Pending Executive",
                                false
                            )
                        )
                    ) & ")"
                  Visible: =gIsApprover
                  Width: =150
            - btnNewProject:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  Icon: ="Add"
                  OnSelect: =Navigate(CreateProjectScreen)
                  Text: ="New Project"
                  Width: =150
      - rowFilterBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =48
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            LayoutOverflowX: =LayoutOverflow.Scroll
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: =Not(IsBlank(gCurrentEmployee.ID))
            Width: =Parent.Width
            Y: =140
